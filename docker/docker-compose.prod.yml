# Antikythera - Docker Compose (Production Mode)
#
# This compose file is optimized for production deployments:
# - Uses nginx to serve static frontend assets
# - Named volumes for data persistence
# - No bind mounts except for config
# - Resource limits and restart policies
#
# Usage:
#   docker-compose -f docker-compose.prod.yml up -d

services:
  # -------------------------------------------------------------------------
  # Backend API Server
  # -------------------------------------------------------------------------
  backend:
    image: himanshusao/antikythera:latest
    container_name: antikythera-backend
    restart: always
    ports:
      - "8006:8006"
    volumes:
      - ~/.antikythera:/root/.antikythera:ro
      - antikythera-data:/app/automation-ideas
      - antikythera-logs:/app/logs
    environment:
      - HOME=/root
    networks:
      - antikythera-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8006/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M

  # -------------------------------------------------------------------------
  # Frontend - Served by nginx
  # -------------------------------------------------------------------------
  frontend:
    image: nginx:alpine
    container_name: antikythera-frontend
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - antikythera-network
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3

  # -------------------------------------------------------------------------
  # Orchestrator - Background Pipeline Processor
  # -------------------------------------------------------------------------
  orchestrator:
    image: himanshusao/antikythera:latest
    container_name: antikythera-orchestrator
    restart: always
    command: --start-orchestrator
    volumes:
      - ~/.antikythera:/root/.antikythera:ro
      - antikythera-data:/app/automation-ideas
      - antikythera-logs:/app/logs
    environment:
      - HOME=/root
    networks:
      - antikythera-network
    depends_on:
      backend:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 256M

# -------------------------------------------------------------------------
# Named Volumes (Docker-managed)
# -------------------------------------------------------------------------
volumes:
  antikythera-data:
    name: antikythera-data
    driver: local
  antikythera-logs:
    name: antikythera-logs
    driver: local

# -------------------------------------------------------------------------
# Networks
# -------------------------------------------------------------------------
networks:
  antikythera-network:
    driver: bridge
    name: antikythera-network